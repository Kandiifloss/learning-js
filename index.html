<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Генератор пароля:</h1>
    <div class="container">
        <div class="checkBoxes">
            <div class="inputArea">
                <label for="input">Длина пароля</label>
                <input type="number" id="input">
                <button id="generate">Сгенерировать</button>
            </div>
            <div class="choice">
                <input type="checkbox" id="includeNumbers">
                <label for="includeNumbers">Включать числа</label><br>
                
                <input type="checkbox" id="includeSimbols">
                <label for="includeSimbols">Включить символы</label><br>
                
                <input type="checkbox" id="includeUppercase">
                <label for="includeUppercase">Включить заглавные буквы</label><br>
                
                <input type="checkbox" id="includeLowercase">
                <label for="includeLowercase">Включать строчные буквы</label><br>
            </div>
            
            <label for="numberRate">Шанс появления числа </label>
            <input type="number" min="0" max="100" value="50" name="asds" id="numberRate">% <br>
            <label for="registerRate">Шанс заглавной буквы </label>
            <input type="number" min="0" max="100" value="50" name="asds" id="registerRate">%
        </div>
    </div>
    <h2 id="display">тут будет пароль</h2>
    
    
    
    <script src="index.js"></script>
</body>
</html>
